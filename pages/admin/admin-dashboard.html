<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Admin</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <meta name="theme-color" content="#f0f2f5">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    .admin-tile {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      transition: all var(--transition);
      cursor: pointer;
    }

    .admin-tile:active {
      box-shadow: var(--neu-inset-sm);
      transform: scale(0.97);
    }

    .admin-tile-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .admin-tile-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .admin-tile-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .admin-tile-highlight .admin-tile-icon {
      background: var(--accent-bg);
      box-shadow: none;
    }

    .admin-tile-highlight .admin-tile-title {
      color: var(--accent-dark);
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.875rem;
    }

    .stat-row:last-child { border-bottom: none; }

    @media (prefers-color-scheme: dark) {
      .stat-row { border-color: rgba(255,255,255,0.05); }
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skel {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="page-header">
    <div>
      <div class="page-header-title">Admin ⚙️</div>
      <div class="page-header-subtitle">Tiqui verwalten</div>
    </div>
    <a href="../../pages/dashboard.html" class="btn btn-secondary btn-sm">← App</a>
  </div>

  <div class="page-content">

    <!-- Schnellübersicht -->
    <div class="section-label">Übersicht</div>
    <div class="card mb-lg" id="overview-stats">
      <div class="skel" style="height:120px;border-radius:8px;"></div>
    </div>

    <!-- Admin-Kacheln -->
    <div class="section-label">Verwaltung</div>
    <div class="admin-grid">

      <a href="../../pages/admin/admin-results.html" class="admin-tile admin-tile-highlight">
        <div class="admin-tile-icon">✅</div>
        <div class="admin-tile-title">Ergebnisse eintragen</div>
        <div class="admin-tile-sub">Punkte berechnen</div>
      </a>

      <a href="../../pages/admin/admin-matches.html" class="admin-tile">
        <div class="admin-tile-icon">📅</div>
        <div class="admin-tile-title">Spielplan</div>
        <div class="admin-tile-sub">Spiele verwalten</div>
      </a>

      <a href="../../pages/admin/admin-quiz.html" class="admin-tile">
        <div class="admin-tile-icon">🧠</div>
        <div class="admin-tile-title">Quiz erstellen</div>
        <div class="admin-tile-sub">Sessions & Fragen</div>
      </a>

      <a href="../../pages/admin/admin-special.html" class="admin-tile">
        <div class="admin-tile-icon">🏆</div>
        <div class="admin-tile-title">Prognosen</div>
        <div class="admin-tile-sub">Fragen & Auflösung</div>
      </a>

      <a href="../../pages/admin/admin-users.html" class="admin-tile">
        <div class="admin-tile-icon">👥</div>
        <div class="admin-tile-title">User verwalten</div>
        <div class="admin-tile-sub">Konten & Admins</div>
      </a>

      <div class="admin-tile" onclick="refreshLeaderboard()">
        <div class="admin-tile-icon">🔄</div>
        <div class="admin-tile-title">Rangliste neu berechnen</div>
        <div class="admin-tile-sub">Alle Punkte aktualisieren</div>
      </div>

    </div>

  </div>
</div>

<script type="module">
  import { requireAdmin } from '../../js/auth.js';
  import { supabase }     from '../../js/supabase.js';
  import { showToast, showConfirm } from '../../js/ui.js';

  const user = await requireAdmin();
  if (!user) throw new Error('Kein Admin');

  /* ---- Übersicht laden ---- */
  async function loadOverview() {
    const [
      { count: matchCount },
      { count: userCount  },
      { count: tipCount   },
      { data:  pending    },
    ] = await Promise.all([
      supabase.from('matches').select('*', { count: 'exact', head: true }),
      supabase.from('users').select('*',   { count: 'exact', head: true }),
      supabase.from('tips').select('*',    { count: 'exact', head: true }),
      supabase.from('matches').select('id').eq('status', 'finished')
        .is('home_score', null),
    ]);

    document.getElementById('overview-stats').innerHTML = `
      <div class="stat-row">
        <span class="text-muted">Spieler</span>
        <strong>${userCount ?? 0}</strong>
      </div>
      <div class="stat-row">
        <span class="text-muted">Spiele im Spielplan</span>
        <strong>${matchCount ?? 0}</strong>
      </div>
      <div class="stat-row">
        <span class="text-muted">Abgegebene Tipps</span>
        <strong>${tipCount ?? 0}</strong>
      </div>
      <div class="stat-row">
        <span class="text-muted">Spiele ohne Ergebnis</span>
        <strong style="color:${(pending?.length ?? 0) > 0 ? 'var(--warning)' : 'var(--success)'}">
          ${pending?.length ?? 0}
        </strong>
      </div>
    `;
  }

  /* ---- Rangliste neu berechnen ---- */
  window.refreshLeaderboard = async function() {
    const ok = await showConfirm('Rangliste komplett neu berechnen?');
    if (!ok) return;

    const { error } = await supabase.rpc('refresh_leaderboard');
    if (error) {
      showToast('Fehler beim Aktualisieren.', 'danger');
    } else {
      showToast('Rangliste aktualisiert ✓', 'success');
    }
  };

  await loadOverview();
</script>
</body>
</html>
