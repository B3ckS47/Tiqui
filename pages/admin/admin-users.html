<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – User verwalten</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <meta name="theme-color" content="#f0f2f5">
  <style>
    .user-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-sm);
    }

    .user-card-info { flex: 1; min-width: 0; }

    .user-card-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .user-card-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .user-card-actions {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skel {
      background: #e9ecf0;
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
    }

    /* ---- Admin Header-Kachel ---- */
    .admin-header { padding: var(--space-md); padding-bottom: 0; }

    .admin-header-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: relative;
      min-height: 72px;
    }

    .admin-header-tile::after {
      content: "";
      position: absolute;
      inset: -10px;
      background-image: url("../../icons/tile-admin.png");
      background-size: cover;
      background-position: center;
      filter: blur(3px);
      z-index: 0;
    }

    .admin-header-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(60,0,0,0.62);
      z-index: 1;
    }

    .admin-header-inner {
      position: relative;
      z-index: 2;
      padding: var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header-title { font-size: 1.2rem; font-weight: 800; color: #ffffff; }
    .admin-header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-top: 2px; }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="admin-header">
    <div class="admin-header-tile">
      <div class="admin-header-inner">
        <div>
          <div class="admin-header-title">User</div>
          <div class="admin-header-sub">Spieler verwalten</div>
        </div>
        <a href="../../pages/admin/admin-dashboard.html" class="btn btn-sm"
           style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.3);">
          ← Admin
        </a>
      </div>
    </div>
  </div>

  <div class="page-content">

    <!-- Such-/Filter-Leiste -->
    <div class="input-group mb-lg">
      <input class="input" id="search" type="search" placeholder="Nach Username suchen…"
             oninput="filterUsers(this.value)">
    </div>

    <!-- Stats -->
    <div class="card-grid mb-lg" id="user-stats">
      <div class="skel" style="height:72px;border-radius:12px;"></div>
      <div class="skel" style="height:72px;border-radius:12px;"></div>
    </div>

    <!-- User-Liste -->
    <div class="section-label">Alle Spieler (<span id="user-count">…</span>)</div>
    <div id="users-list">
      <div class="skel" style="height:64px;border-radius:12px;margin-bottom:8px;"></div>
      <div class="skel" style="height:64px;border-radius:12px;margin-bottom:8px;"></div>
      <div class="skel" style="height:64px;border-radius:12px;"></div>
    </div>

  </div>
</div>

<script type="module">
  import { requireAdmin, getCurrentUser } from '../../js/auth.js';
  import { supabase }                    from '../../js/supabase.js';
  import { showToast, showConfirm }      from '../../js/ui.js';
  import { getInitials }                 from '../../js/router.js';

  const adminUser = await requireAdmin();
  if (!adminUser) throw new Error('Kein Admin');

  let allUsers    = [];
  let filteredUsers = [];

  async function loadUsers() {
    const [{ data: users }, { data: invites }] = await Promise.all([
      supabase.from('users').select('*').order('created_at', { ascending: true }),
      supabase.from('invitations').select('used_by, invited_by, users!invitations_invited_by_fkey(username)'),
    ]);

    // Map: user_id → eingeladen von (username)
    const inviteMap = Object.fromEntries(
      (invites ?? [])
        .filter(i => i.used_by)
        .map(i => [i.used_by, i.users?.username ?? '–'])
    );

    allUsers = (users ?? []).map(u => ({
      ...u,
      invited_by_name: inviteMap[u.id] ?? null,
    }));

    filteredUsers = allUsers;

    // Stats
    const adminCount = allUsers.filter(u => u.is_admin).length;
    document.getElementById('user-stats').innerHTML = `
      <div class="stat-tile">
        <div class="stat-tile-value">${allUsers.length}</div>
        <div class="stat-tile-label">Spieler gesamt</div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-value">${adminCount}</div>
        <div class="stat-tile-label">Admins</div>
      </div>
    `;

    renderUsers();
  }

  function renderUsers() {
    document.getElementById('user-count').textContent = filteredUsers.length;

    document.getElementById('users-list').innerHTML = filteredUsers.map(u => {
      const isMe   = u.id === adminUser.id;
      const joined = new Date(u.created_at).toLocaleDateString('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric',
      });

      return `
        <div class="user-card">
          <div class="avatar-placeholder avatar-sm">${getInitials(u.username)}</div>
          <div class="user-card-info">
            <div class="user-card-name">
              ${u.username}
              ${u.is_admin ? '<span class="badge badge-green" style="font-size:0.65rem">Admin</span>' : ''}
              ${isMe ? '<span class="badge badge-gray" style="font-size:0.65rem">Du</span>' : ''}
            </div>
            <div class="user-card-meta">
              Beigetreten: ${joined}
              ${u.invited_by_name ? ` · Eingeladen von: ${u.invited_by_name}` : ''}
            </div>
          </div>
          <div class="user-card-actions">
            ${!isMe ? `
              <button
                class="btn btn-secondary btn-sm"
                onclick="toggleAdmin('${u.id}', '${u.username}', ${u.is_admin})"
                title="${u.is_admin ? 'Admin entfernen' : 'Admin machen'}"
              >
                ${u.is_admin ? '👤' : '⭐'}
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }).join('') || '<p class="text-muted text-sm">Keine User gefunden.</p>';
  }

  /* ---- Suche ---- */
  window.filterUsers = function(query) {
    const q = query.toLowerCase();
    filteredUsers = q
      ? allUsers.filter(u => u.username.toLowerCase().includes(q))
      : allUsers;
    renderUsers();
  };

  /* ---- Admin-Rolle umschalten ---- */
  window.toggleAdmin = async function(userId, username, isCurrentlyAdmin) {
    const action = isCurrentlyAdmin ? 'Admin-Rechte entfernen' : 'zum Admin machen';
    const ok = await showConfirm(`"${username}" ${action}?`);
    if (!ok) return;

    const { error } = await supabase
      .from('users')
      .update({ is_admin: !isCurrentlyAdmin })
      .eq('id', userId);

    if (error) {
      showToast('Fehler beim Aktualisieren.', 'danger');
    } else {
      showToast(`${username} ${isCurrentlyAdmin ? 'ist kein Admin mehr' : 'ist jetzt Admin'} ✓`, 'success');
      await loadUsers();
    }
  };

  await loadUsers();
</script>
</body>
</html>
