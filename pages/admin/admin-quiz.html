<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Quiz Admin</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <meta name="theme-color" content="#f0f2f5">
  <style>
    /* ---- Session-Karte ---- */
    .session-card {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
    }

    .session-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .session-title {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .session-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .session-actions {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    /* ---- Fragen-Liste innerhalb Session ---- */
    .question-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .question-item {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .question-item-num {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .question-item-text {
      flex: 1;
      min-width: 0;
    }

    .question-item-q {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .question-item-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ---- Neue Frage Formular ---- */
    .add-question-panel {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-top: var(--space-md);
    }

    .add-question-panel h4 {
      font-size: 0.9rem;
      margin-bottom: var(--space-md);
      color: var(--text-secondary);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }

    .option-input-wrap {
      position: relative;
    }

    .option-correct-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .option-correct-btn.selected {
      background: var(--accent);
      box-shadow: none;
      color: white;
    }

    .option-input {
      padding-right: 42px !important;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-md);
    }

    /* ---- Neue Session Formular ---- */
    .new-session-form {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    /* ---- Status-Badge ---- */
    .status-draft    { background: var(--bg); box-shadow: var(--neu-inset-sm); color: var(--text-muted); }
    .status-active   { background: var(--accent-bg); color: var(--accent-dark); }
    .status-finished { background: #fef3cd; color: var(--gold-dark); }

    /* ---- Loader ---- */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skel {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
    }

    .loader-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Aufklapp-Bereich ---- */
    .session-body {
      display: none;
    }
    .session-body.open {
      display: block;
    }

    /* ---- Admin Header-Kachel ---- */
    .admin-header { padding: var(--space-md); padding-bottom: 0; }

    .admin-header-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: relative;
      min-height: 72px;
    }

    .admin-header-tile::after {
      content: "";
      position: absolute;
      inset: -10px;
      background-image: url("../../icons/tile-admin.png");
      background-size: cover;
      background-position: center;
      filter: blur(3px);
      z-index: 0;
    }

    .admin-header-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(60,0,0,0.62);
      z-index: 1;
    }

    .admin-header-inner {
      position: relative;
      z-index: 2;
      padding: var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header-title { font-size: 1.2rem; font-weight: 800; color: #ffffff; }
    .admin-header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-top: 2px; }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="admin-header">
    <div class="admin-header-tile">
      <div class="admin-header-inner">
        <div>
          <div class="admin-header-title">Quiz Editor</div>
          <div class="admin-header-sub">Fragen & Sessions</div>
        </div>
        <a href="../../pages/admin/admin-dashboard.html" class="btn btn-sm"
           style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.3);">
          ← Admin
        </a>
      </div>
    </div>
  </div>
  </div>

  <div class="page-content">

    <!-- Neue Session -->
    <div class="section-label">Neue Quiz-Session</div>
    <div class="new-session-form">
      <div class="input-group">
        <label class="input-label">Titel</label>
        <input class="input" id="session-title" type="text"
               placeholder="z.B. Quiz nach der Gruppenphase">
      </div>
      <div class="input-group">
        <label class="input-label">Beschreibung (optional)</label>
        <input class="input" id="session-desc" type="text"
               placeholder="z.B. 10 Fragen rund um die WM 2026">
      </div>
      <button class="btn btn-primary btn-block" id="create-session-btn"
              onclick="createSession()">
        Session erstellen
      </button>
    </div>

    <!-- Sessions -->
    <div class="section-label">Alle Sessions</div>
    <div id="sessions-container">
      <div class="skel" style="height:120px;border-radius:20px;margin-bottom:12px;"></div>
      <div class="skel" style="height:120px;border-radius:20px;"></div>
    </div>

  </div>
</div>

<script type="module">
  import { requireAdmin }            from '../../js/auth.js';
  import { supabase }                from '../../js/supabase.js';
  import { showToast, showConfirm }  from '../../js/ui.js';

  await requireAdmin();

  let sessions   = [];
  let questions  = {};  // session_id → [questions]
  let categories = [];
  let openSession = null;  // welche Session ist aufgeklappt
  let correctOption = {};  // session_id → index (0-3)

  /* ---- Daten laden ---- */
  async function loadData() {
    const [{ data: sess }, { data: qs }, { data: cats }] = await Promise.all([
      supabase.from('quiz_sessions')
        .select('*').order('created_at', { ascending: false }),
      supabase.from('quiz_questions')
        .select('*').order('sort_order', { ascending: true }),
      supabase.from('quiz_categories').select('*').order('name'),
    ]);

    sessions   = sess ?? [];
    categories = cats ?? [];
    questions  = {};
    (qs ?? []).forEach(q => {
      if (!questions[q.session_id]) questions[q.session_id] = [];
      questions[q.session_id].push(q);
    });

    renderSessions();
  }

  /* ---- Sessions rendern ---- */
  function renderSessions() {
    const container = document.getElementById('sessions-container');
    if (sessions.length === 0) {
      container.innerHTML = '<p class="text-muted text-sm">Noch keine Sessions.</p>';
      return;
    }

    container.innerHTML = sessions.map(s => {
      const qs        = questions[s.id] ?? [];
      const isOpen    = openSession === s.id;
      const statusCls = `status-${s.status}`;

      return `
        <div class="session-card" id="sess-${s.id}">
          <div class="session-card-header">
            <div style="cursor:pointer;flex:1" onclick="toggleSession('${s.id}')">
              <div class="session-title">${s.title}</div>
              <div class="session-meta">
                ${qs.length} Fragen ·
                ${s.description ?? 'Keine Beschreibung'}
              </div>
            </div>
            <span class="badge ${statusCls}">${statusLabel(s.status)}</span>
          </div>

          <div class="session-actions">
            ${s.status === 'draft' ? `
              <button class="btn btn-primary btn-sm"
                      onclick="setStatus('${s.id}', 'active')">
                Aktivieren
              </button>
            ` : ''}
            ${s.status === 'active' ? `
              <button class="btn btn-secondary btn-sm"
                      onclick="setStatus('${s.id}', 'finished')">
                Beenden
              </button>
            ` : ''}
            <button class="btn btn-secondary btn-sm"
                    onclick="toggleSession('${s.id}')">
              ${isOpen ? 'Einklappen ▲' : 'Fragen ▼ (${qs.length})'}
            </button>
            <button class="btn btn-secondary btn-sm" style="color:var(--danger)"
                    onclick="deleteSession('${s.id}', '${s.title}')">✕</button>
          </div>

          <div class="session-body ${isOpen ? 'open' : ''}" id="body-${s.id}">

            <!-- Fragen-Liste -->
            <div class="question-list" id="qlist-${s.id}">
              ${renderQuestionList(s.id)}
            </div>

            <!-- Neue Frage hinzufügen -->
            ${s.status === 'draft' || s.status === 'active' ? `
              <div class="add-question-panel">
                <h4>Neue Frage hinzufügen</h4>

                <div class="input-group">
                  <label class="input-label">Frage</label>
                  <input class="input" id="q-text-${s.id}" type="text"
                         placeholder="z.B. Wer gewann die WM 1990?">
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
                  <div class="input-group">
                    <label class="input-label">Typ</label>
                    <select class="input" id="q-type-${s.id}"
                            onchange="onTypeChange('${s.id}')">
                      <option value="multiple_choice">Multiple Choice</option>
                      <option value="true_false">Wahr / Falsch</option>
                      <option value="estimate">Schätzfrage</option>
                      <option value="image_quiz">Bildquiz</option>
                    </select>
                  </div>
                  <div class="input-group">
                    <label class="input-label">Kategorie</label>
                    <select class="input" id="q-cat-${s.id}">
                      <option value="">Keine</option>
                      ${categories.map(c =>
                        `<option value="${c.id}">${c.icon ?? ''} ${c.name}</option>`
                      ).join('')}
                    </select>
                  </div>
                </div>

                <!-- Multiple Choice Optionen -->
                <div id="mc-options-${s.id}">
                  <label class="input-label">Antwortoptionen (✓ = richtig)</label>
                  <div class="options-grid">
                    ${[0,1,2,3].map(i => `
                      <div class="option-input-wrap">
                        <input class="input option-input" id="opt-${s.id}-${i}"
                               type="text" placeholder="Option ${i+1}">
                        <button class="option-correct-btn" id="correct-btn-${s.id}-${i}"
                                onclick="selectCorrect('${s.id}', ${i})">✓</button>
                      </div>
                    `).join('')}
                  </div>
                </div>

                <!-- Wahr/Falsch -->
                <div id="tf-options-${s.id}" class="hidden">
                  <label class="input-label">Richtige Antwort</label>
                  <div class="flex gap-sm mb-md">
                    <button class="btn btn-secondary btn-sm" id="tf-true-${s.id}"
                            onclick="selectTF('${s.id}', true)">Wahr</button>
                    <button class="btn btn-secondary btn-sm" id="tf-false-${s.id}"
                            onclick="selectTF('${s.id}', false)">Falsch</button>
                  </div>
                </div>

                <!-- Schätzfrage -->
                <div id="est-options-${s.id}" class="hidden">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
                    <div class="input-group">
                      <label class="input-label">Richtige Zahl</label>
                      <input class="input" id="est-value-${s.id}" type="number"
                             placeholder="z.B. 171">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Toleranz (±)</label>
                      <input class="input" id="est-tol-${s.id}" type="number"
                             value="5" placeholder="z.B. 5">
                    </div>
                  </div>
                </div>

                <!-- Bildquiz -->
                <div id="img-options-${s.id}" class="hidden">
                  <div class="input-group">
                    <label class="input-label">Bild-URL</label>
                    <input class="input" id="img-url-${s.id}" type="url"
                           placeholder="https://…">
                  </div>
                  <label class="input-label">Antwortoptionen (✓ = richtig)</label>
                  <div class="options-grid">
                    ${[0,1,2,3].map(i => `
                      <div class="option-input-wrap">
                        <input class="input option-input" id="img-opt-${s.id}-${i}"
                               type="text" placeholder="Option ${i+1}">
                        <button class="option-correct-btn" id="img-correct-btn-${s.id}-${i}"
                                onclick="selectImgCorrect('${s.id}', ${i})">✓</button>
                      </div>
                    `).join('')}
                  </div>
                </div>

                <div class="form-row-3" style="margin-top:var(--space-md)">
                  <div class="input-group">
                    <label class="input-label">Punkte</label>
                    <input class="input" id="q-pts-${s.id}" type="number"
                           value="5" min="1" max="20">
                  </div>
                  <div class="input-group">
                    <label class="input-label">Zeit (Sek.)</label>
                    <input class="input" id="q-time-${s.id}" type="number"
                           value="20" min="5" max="120">
                  </div>
                  <div style="display:flex;align-items:flex-end">
                    <button class="btn btn-primary btn-block"
                            id="add-q-btn-${s.id}"
                            onclick="addQuestion('${s.id}')">
                      + Frage
                    </button>
                  </div>
                </div>

              </div>
            ` : ''}

          </div>
        </div>
      `;
    }).join('');

    // Correct-Option Buttons initialisieren
    sessions.forEach(s => {
      if (correctOption[s.id] !== undefined) {
        selectCorrect(s.id, correctOption[s.id], true);
      }
    });
  }

  /* ---- Fragen-Liste für eine Session ---- */
  function renderQuestionList(sessionId) {
    const qs = questions[sessionId] ?? [];
    if (qs.length === 0) {
      return '<p class="text-xs text-muted">Noch keine Fragen.</p>';
    }
    return qs.map((q, idx) => `
      <div class="question-item">
        <div class="question-item-num">${idx + 1}</div>
        <div class="question-item-text">
          <div class="question-item-q">${q.question_text}</div>
          <div class="question-item-meta">
            ${typeLabel(q.question_type)} · ${q.points_value} Pkt · ${q.time_limit_sec}s
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="color:var(--danger);flex-shrink:0"
                onclick="deleteQuestion('${q.id}', '${sessionId}')">✕</button>
      </div>
    `).join('');
  }

  /* ---- Session aufklappen ---- */
  window.toggleSession = function(sessionId) {
    openSession = openSession === sessionId ? null : sessionId;
    renderSessions();
  };

  /* ---- Typ-Wechsel ---- */
  window.onTypeChange = function(sessionId) {
    const type = document.getElementById(`q-type-${sessionId}`)?.value;
    const areas = ['mc', 'tf', 'est', 'img'];
    areas.forEach(a => {
      const el = document.getElementById(`${a}-options-${sessionId}`);
      if (el) el.classList.add('hidden');
    });
    const map = {
      multiple_choice: 'mc',
      true_false:      'tf',
      estimate:        'est',
      image_quiz:      'img',
    };
    const el = document.getElementById(`${map[type]}-options-${sessionId}`);
    if (el) el.classList.remove('hidden');
  };

  /* ---- Richtige Option markieren ---- */
  window.selectCorrect = function(sessionId, idx, silent = false) {
    correctOption[sessionId] = idx;
    [0,1,2,3].forEach(i => {
      const btn = document.getElementById(`correct-btn-${sessionId}-${i}`);
      if (btn) btn.classList.toggle('selected', i === idx);
    });
  };

  window.selectImgCorrect = function(sessionId, idx) {
    correctOption[`img-${sessionId}`] = idx;
    [0,1,2,3].forEach(i => {
      const btn = document.getElementById(`img-correct-btn-${sessionId}-${i}`);
      if (btn) btn.classList.toggle('selected', i === idx);
    });
  };

  let tfAnswer = {};
  window.selectTF = function(sessionId, val) {
    tfAnswer[sessionId] = val;
    document.getElementById(`tf-true-${sessionId}`)
      ?.classList.toggle('btn-primary', val === true);
    document.getElementById(`tf-false-${sessionId}`)
      ?.classList.toggle('btn-primary', val === false);
    document.getElementById(`tf-true-${sessionId}`)
      ?.classList.toggle('btn-secondary', val !== true);
    document.getElementById(`tf-false-${sessionId}`)
      ?.classList.toggle('btn-secondary', val !== false);
  };

  /* ---- Session erstellen ---- */
  window.createSession = async function() {
    const title = document.getElementById('session-title').value.trim();
    const desc  = document.getElementById('session-desc').value.trim();
    if (!title) { showToast('Bitte Titel eingeben.', 'warning'); return; }

    const btn = document.getElementById('create-session-btn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="loader-spinner"></span>';

    const { data: { user } } = await supabase.auth.getUser();
    const { error } = await supabase.from('quiz_sessions').insert({
      title,
      description:  desc || null,
      created_by:   user.id,
      status:       'draft',
    });

    btn.disabled  = false;
    btn.textContent = 'Session erstellen';

    if (error) {
      showToast('Fehler beim Erstellen.', 'danger');
    } else {
      showToast('Session erstellt ✓', 'success');
      document.getElementById('session-title').value = '';
      document.getElementById('session-desc').value  = '';
      await loadData();
    }
  };

  /* ---- Session Status ändern ---- */
  window.setStatus = async function(sessionId, newStatus) {
    const labels = { active: 'aktivieren', finished: 'beenden' };
    const ok = await showConfirm(`Session ${labels[newStatus] ?? newStatus}?`);
    if (!ok) return;

    const update = { status: newStatus };
    if (newStatus === 'active')   update.starts_at = new Date().toISOString();
    if (newStatus === 'finished') update.ended_at  = new Date().toISOString();

    const { error } = await supabase
      .from('quiz_sessions').update(update).eq('id', sessionId);

    if (error) {
      showToast('Fehler.', 'danger');
    } else {
      showToast('Status aktualisiert ✓', 'success');
      await loadData();
    }
  };

  /* ---- Session löschen ---- */
  window.deleteSession = async function(sessionId, title) {
    const ok = await showConfirm(
      `Session "${title}" löschen?\nAlle Fragen und Antworten werden gelöscht.`
    );
    if (!ok) return;
    const { error } = await supabase
      .from('quiz_sessions').delete().eq('id', sessionId);
    if (error) {
      showToast('Fehler beim Löschen.', 'danger');
    } else {
      showToast('Session gelöscht.', 'success');
      await loadData();
    }
  };

  /* ---- Frage hinzufügen ---- */
  window.addQuestion = async function(sessionId) {
    const type      = document.getElementById(`q-type-${sessionId}`)?.value;
    const text      = document.getElementById(`q-text-${sessionId}`)?.value?.trim();
    const catId     = document.getElementById(`q-cat-${sessionId}`)?.value || null;
    const pts       = parseInt(document.getElementById(`q-pts-${sessionId}`)?.value, 10);
    const timeLim   = parseInt(document.getElementById(`q-time-${sessionId}`)?.value, 10);

    if (!text) { showToast('Bitte Frage eingeben.', 'warning'); return; }

    let options       = null;
    let correctAnswer = null;
    let imageUrl      = null;

    if (type === 'multiple_choice') {
      const opts = [0,1,2,3].map(i =>
        document.getElementById(`opt-${sessionId}-${i}`)?.value?.trim() ?? ''
      );
      if (opts.some(o => !o)) { showToast('Bitte alle 4 Optionen ausfüllen.', 'warning'); return; }
      const ci = correctOption[sessionId];
      if (ci === undefined) { showToast('Bitte richtige Antwort markieren.', 'warning'); return; }
      options       = opts;
      correctAnswer = { index: ci };

    } else if (type === 'true_false') {
      if (tfAnswer[sessionId] === undefined) {
        showToast('Bitte Wahr oder Falsch auswählen.', 'warning'); return;
      }
      options       = ['Wahr', 'Falsch'];
      correctAnswer = { index: tfAnswer[sessionId] ? 0 : 1 };

    } else if (type === 'estimate') {
      const val = parseInt(document.getElementById(`est-value-${sessionId}`)?.value, 10);
      const tol = parseInt(document.getElementById(`est-tol-${sessionId}`)?.value, 10);
      if (isNaN(val)) { showToast('Bitte richtigen Wert eingeben.', 'warning'); return; }
      correctAnswer = { value: val, tolerance: tol || 0 };

    } else if (type === 'image_quiz') {
      imageUrl = document.getElementById(`img-url-${sessionId}`)?.value?.trim();
      if (!imageUrl) { showToast('Bitte Bild-URL eingeben.', 'warning'); return; }
      const opts = [0,1,2,3].map(i =>
        document.getElementById(`img-opt-${sessionId}-${i}`)?.value?.trim() ?? ''
      );
      if (opts.some(o => !o)) { showToast('Bitte alle 4 Optionen ausfüllen.', 'warning'); return; }
      const ci = correctOption[`img-${sessionId}`];
      if (ci === undefined) { showToast('Bitte richtige Antwort markieren.', 'warning'); return; }
      options       = opts;
      correctAnswer = { index: ci };
    }

    const btn = document.getElementById(`add-q-btn-${sessionId}`);
    btn.disabled  = true;
    btn.innerHTML = '<span class="loader-spinner"></span>';

    const sortOrder = (questions[sessionId]?.length ?? 0);
    const { error } = await supabase.from('quiz_questions').insert({
      session_id:    sessionId,
      category_id:   catId,
      question_text: text,
      question_type: type,
      options:       options ? JSON.stringify(options) : null,
      correct_answer: JSON.stringify(correctAnswer),
      image_url:     imageUrl,
      points_value:  pts,
      time_limit_sec: timeLim,
      sort_order:    sortOrder,
    });

    btn.disabled  = false;
    btn.textContent = '+ Frage';

    if (error) {
      showToast('Fehler beim Hinzufügen.', 'danger');
    } else {
      showToast('Frage hinzugefügt ✓', 'success');
      document.getElementById(`q-text-${sessionId}`).value = '';
      delete correctOption[sessionId];
      delete correctOption[`img-${sessionId}`];
      delete tfAnswer[sessionId];
      await loadData();
      openSession = sessionId;
    }
  };

  /* ---- Frage löschen ---- */
  window.deleteQuestion = async function(questionId, sessionId) {
    const ok = await showConfirm('Diese Frage löschen?');
    if (!ok) return;
    const { error } = await supabase
      .from('quiz_questions').delete().eq('id', questionId);
    if (error) {
      showToast('Fehler beim Löschen.', 'danger');
    } else {
      showToast('Frage gelöscht.', 'success');
      openSession = sessionId;
      await loadData();
    }
  };

  /* ---- Hilfsfunktionen ---- */
  function statusLabel(s) {
    return { draft: 'Entwurf', active: 'Aktiv', finished: 'Beendet' }[s] ?? s;
  }

  function typeLabel(t) {
    return {
      multiple_choice: 'Multiple Choice',
      true_false:      'Wahr/Falsch',
      estimate:        'Schätzfrage',
      image_quiz:      'Bildquiz',
    }[t] ?? t;
  }

  await loadData();
</script>
</body>
</html>
