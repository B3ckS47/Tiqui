<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Rangliste</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <meta name="theme-color" content="#f0f2f5">
  <style>

    /* ---- Header-Kachel ---- */
    .lb-header { padding: var(--space-md); padding-bottom: 0; }

    .lb-header-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: relative;
      min-height: 72px;
    }

    .lb-header-tile::after {
      content: '';
      position: absolute;
      inset: -10px;
      background-image: url('../icons/tile-rangliste.png');
      background-size: cover;
      background-position: center;
      filter: blur(1.5px);
      z-index: 0;
    }

    .lb-header-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(60,0,80,0.62);
      z-index: 1;
    }

    .lb-header-inner {
      position: relative;
      z-index: 2;
      padding: var(--space-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lb-header-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
    }

    .lb-header-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    /* ---- View-Toggle (wie Tipps-Filter) ---- */
    .view-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3px;
      box-shadow: var(--shadow-sm);
      gap: 2px;
    }

    .view-btn {
      flex: 1;
      padding: 7px 4px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-sans);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .view-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    /* ---- Podest ---- */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: var(--space-md);
      padding: 0 var(--space-sm);
    }

    .podium-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      max-width: 120px;
    }

    .podium-item.rank-1 { order: 2; }
    .podium-item.rank-2 { order: 1; }
    .podium-item.rank-3 { order: 3; }

    .podium-avatar {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-full);
      background: var(--accent);
      border: 2px solid var(--bg-card);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .podium-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .podium-item.rank-1 .podium-avatar {
      width: 64px;
      height: 64px;
      font-size: 1.2rem;
      border: 3px solid #f9c74f;
      box-shadow: var(--shadow-md), 0 0 0 2px rgba(249,199,79,0.3);
    }

    .podium-crown {
      position: absolute;
      top: -16px;
      font-size: 1.1rem;
    }

    .podium-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .podium-points {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
    }

    .podium-block {
      width: 100%;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: var(--shadow-sm);
    }

    .podium-item.rank-1 .podium-block {
      height: 52px;
      background: linear-gradient(180deg, #fef3cd, #fde68a);
      color: var(--gold-dark);
    }

    .podium-item.rank-2 .podium-block {
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .podium-item.rank-3 .podium-block {
      height: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* ---- Mein Platz ---- */
    .my-rank-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: var(--space-md) var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .my-rank-pos {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--accent);
      min-width: 36px;
    }

    .my-rank-info { flex: 1; min-width: 0; }

    .my-rank-name {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 0.92rem;
    }

    .my-rank-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .my-rank-pts {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent);
    }

    /* ---- Rang-Zeilen ---- */
    .rank-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rank-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: var(--space-sm) var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .rank-row:active { opacity: 0.85; transform: scale(0.99); }

    .rank-row.is-me {
      border-color: var(--accent-border);
      border-left: 3px solid var(--accent);
    }

    .rank-pos {
      font-size: 0.88rem;
      font-weight: 800;
      min-width: 24px;
      text-align: center;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .rank-pos.p1 { color: #c9a227; }
    .rank-pos.p2 { color: #9e9e9e; }
    .rank-pos.p3 { color: #a0522d; }

    .rank-row-info { flex: 1; min-width: 0; }

    .rank-row-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-row-pills {
      display: flex;
      gap: var(--space-sm);
      margin-top: 2px;
    }

    .rank-pill {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .rank-pts {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Ausklapp-Detail */
    .rank-detail {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      margin-top: -2px;
      margin-bottom: 2px;
    }

    .rank-detail.open { display: block; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child { border-bottom: none; }

    /* ---- Skeleton ---- */
    .skel {
      background: #e9ecf0;
      border-radius: var(--radius-sm);
      animation: pulse 1.4s ease-in-out infinite;
      display: block;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

  </style>
</head>
<body>
<div class="app-shell">

  <!-- Header-Kachel -->
  <div class="lb-header">
    <div class="lb-header-tile">
      <div class="lb-header-inner">
        <div>
          <div class="lb-header-title">Rangliste</div>
          <div class="lb-header-sub" id="lb-sub">Wird geladen…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page-content" style="padding-top:var(--space-md);">

    <!-- View-Toggle -->
    <div class="view-toggle mb-md">
      <button class="view-btn active" data-view="total">Gesamt</button>
      <button class="view-btn" data-view="tips">Tipps</button>
      <button class="view-btn" data-view="quiz">Quiz</button>
      <button class="view-btn" data-view="special">Prognosen</button>
    </div>

    <!-- Podest -->
    <div class="podium mb-lg" id="podium">
      <div class="skel" style="height:160px;flex:1;border-radius:12px;"></div>
      <div class="skel" style="height:160px;flex:1;border-radius:12px;"></div>
      <div class="skel" style="height:160px;flex:1;border-radius:12px;"></div>
    </div>

    <!-- Mein Platz -->
    <div class="section-label">Mein Platz</div>
    <div class="my-rank-card mb-md" id="my-rank-card">
      <div class="skel" style="width:100%;height:44px;border-radius:8px;"></div>
    </div>

    <!-- Alle Spieler -->
    <div class="section-label">Alle Spieler</div>
    <div class="rank-list" id="rank-list">
      <div class="skel" style="height:56px;border-radius:8px;"></div>
      <div class="skel" style="height:56px;border-radius:8px;margin-top:6px;"></div>
      <div class="skel" style="height:56px;border-radius:8px;margin-top:6px;"></div>
    </div>

  </div>
</div>

<script type="module">
  import { requireAuth } from '../js/auth.js';
  import { supabase }    from '../js/supabase.js';
  import { initNav }     from '../js/router.js';
  import { renderAvatar } from '../js/ui.js';

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  }

  const session = await requireAuth();
  if (!session) throw new Error('Nicht eingeloggt');
  const userId = session.user.id;

  initNav();

  let leaderboard = [];
  let currentView = 'total';

  /* ================================================
     DATEN LADEN
  ================================================ */
  async function loadLeaderboard() {
    const { data, error } = await supabase
      .from('leaderboard')
      .select('*')
      .order('rank', { ascending: true });

    if (error || !data) return;
    leaderboard = data;

    document.getElementById('lb-sub').textContent =
      `${data.length} Spieler · Stand: jetzt`;

    renderPodium();
    renderMyRank();
    renderList();
  }

  /* ================================================
     PODEST
  ================================================ */
  function renderPodium() {
    const top3  = leaderboard.slice(0, 3);
    const podEl = document.getElementById('podium');

    if (!top3.length) {
      podEl.innerHTML = `<p class="text-muted text-sm">Noch keine Punkte vergeben.</p>`;
      return;
    }

    // Reihenfolge: 2 (links) — 1 (mitte) — 3 (rechts)
    const slots  = [top3[1] ?? null, top3[0] ?? null, top3[2] ?? null];
    const medals = ['🥈', '🥇', '🥉'];
    const ranks  = [2, 1, 3];

    podEl.innerHTML = slots.map((player, i) => {
      if (!player) return `<div style="flex:1"></div>`;
      const isMe = player.user_id === userId;
      const avatarHtml = player.avatar_url
        ? `<img src="${player.avatar_url}" alt="${player.username}" style="width:100%;height:100%;object-fit:cover;">`
        : (player.username ?? '?').split(/[\s_-]/).map(w => w[0]).join('').toUpperCase().slice(0, 2);

      return `
        <div class="podium-item rank-${ranks[i]}">
          <div class="podium-avatar">
            ${ranks[i] === 1 ? '<span class="podium-crown">👑</span>' : ''}
            ${avatarHtml}
          </div>
          <div class="podium-name">${isMe ? 'Du' : player.username}</div>
          <div class="podium-points">${pointsFor(player)} Pkt</div>
          <div class="podium-block">${medals[i]}</div>
        </div>`;
    }).join('');
  }

  /* ================================================
     MEIN PLATZ
  ================================================ */
  function renderMyRank() {
    const me = leaderboard.find(p => p.user_id === userId);
    const el = document.getElementById('my-rank-card');

    if (!me) {
      el.innerHTML = `<p class="text-muted text-sm">Noch keine Punkte — gib deinen ersten Tipp ab!</p>`;
      return;
    }

    el.innerHTML = `
      <div class="my-rank-pos">#${me.rank}</div>
      ${renderAvatar(me.username, me.avatar_url ?? null, 'md')}
      <div class="my-rank-info">
        <div class="my-rank-name">Du · ${me.username}</div>
        <div class="my-rank-sub">Tipps: ${me.tip_points} · Quiz: ${me.quiz_points} · Prognosen: ${me.special_points}</div>
      </div>
      <div class="my-rank-pts">${me.total_points} Pkt</div>`;
  }

  /* ================================================
     LISTE
  ================================================ */
  function renderList() {
    const list = document.getElementById('rank-list');

    const key = { total:'total_points', tips:'tip_points', quiz:'quiz_points', special:'special_points' }[currentView];
    const sorted = [...leaderboard].sort((a, b) => (b[key] ?? 0) - (a[key] ?? 0));

    list.innerHTML = sorted.map((player, idx) => {
      const isMe     = player.user_id === userId;
      const pos      = idx + 1;
      const pts      = player[key] ?? 0;
      const posClass = pos === 1 ? 'p1' : pos === 2 ? 'p2' : pos === 3 ? 'p3' : '';

      return `
        <div class="rank-row ${isMe ? 'is-me' : ''}" onclick="toggleDetail('${player.user_id}')">
          <div class="rank-pos ${posClass}">${pos}</div>
          ${renderAvatar(player.username, player.avatar_url ?? null, 'sm')}
          <div class="rank-row-info">
            <div class="rank-row-name">${player.username}${isMe ? ' (Du)' : ''}</div>
            <div class="rank-row-pills">
              <span class="rank-pill">Tipps: ${player.tip_points}</span>
              <span class="rank-pill">·</span>
              <span class="rank-pill">Quiz: ${player.quiz_points}</span>
              <span class="rank-pill">·</span>
              <span class="rank-pill">Prognosen: ${player.special_points}</span>
            </div>
          </div>
          <div class="rank-pts">${pts} Pkt</div>
        </div>
        <div class="rank-detail" id="detail-${player.user_id}">
          <div class="detail-row">
            <span>Tipps</span><strong>${player.tip_points} Pkt</strong>
          </div>
          <div class="detail-row">
            <span>Quiz</span><strong>${player.quiz_points} Pkt</strong>
          </div>
          <div class="detail-row">
            <span>Prognosen</span><strong>${player.special_points} Pkt</strong>
          </div>
          <div class="detail-row">
            <span style="font-weight:700">Gesamt</span>
            <strong style="color:var(--accent)">${player.total_points} Pkt</strong>
          </div>
        </div>`;
    }).join('');
  }

  /* ---- Detail ausklappen ---- */
  window.toggleDetail = function(uid) {
    document.getElementById(`detail-${uid}`)?.classList.toggle('open');
  };

  /* ---- Hilfsfunktion ---- */
  function pointsFor(player) {
    const key = { total:'total_points', tips:'tip_points', quiz:'quiz_points', special:'special_points' }[currentView];
    return player[key] ?? 0;
  }

  /* ---- View-Toggle ---- */
  document.querySelector('.view-toggle').addEventListener('click', e => {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    renderPodium();
    renderList();
  });

  await loadLeaderboard();
</script>
</body>
</html>
