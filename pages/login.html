<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Login</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <meta name="theme-color" content="#f0f2f5">
  <link rel="icon" type="image/svg+xml" href="../icons/tiqui-logo.svg">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-lg);
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-xl);
      box-shadow: var(--neu-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto var(--space-md);
    }

    .logo-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }

    .logo-title span { color: var(--accent); }

    .logo-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: var(--space-xs);
    }

    .login-card {
      background: var(--bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--neu-raised);
      padding: var(--space-xl);
    }

    .login-card h2 {
      font-size: 1.1rem;
      margin-bottom: var(--space-lg);
      color: var(--text-secondary);
      font-weight: 500;
    }

    .loader-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: var(--space-lg) 0;
      position: relative;
    }
    .divider-text::before,
    .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }
    .divider-text::before { left: 0; }
    .divider-text::after  { right: 0; }

    @media (prefers-color-scheme: dark) {
      .divider-text::before,
      .divider-text::after { background: rgba(255,255,255,0.08); }
    }

    .no-register-hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: var(--space-lg);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon" style="background:transparent;box-shadow:none;padding:0;"><img src="../icons/tiqui-logo.svg" style="width:80px;height:80px;object-fit:contain;"></div>
      <div class="logo-title">Ti<span>qui</span></div>
      <p class="logo-subtitle">WM 2026 · Tippen & Quizzen</p>
    </div>

    <!-- Login-Formular -->
    <div class="login-card">
      <h2>Willkommen zurück</h2>

      <div class="input-group">
        <label class="input-label" for="email">E-Mail</label>
        <input class="input" type="email" id="email"
               autocomplete="email" placeholder="deine@email.de">
      </div>

      <div class="input-group">
        <label class="input-label" for="password">Passwort</label>
        <input class="input" type="password" id="password"
               autocomplete="current-password" placeholder="••••••••">
      </div>

      <div id="error-msg" style="display:none;color:var(--danger);font-size:0.85rem;margin-top:var(--space-sm);text-align:center;"></div>

      <button class="btn btn-primary btn-block btn-lg mt-md" id="login-btn" onclick="handleLogin()">
        Anmelden
      </button>

      <div class="divider-text">oder</div>

      <p class="no-register-hint">
        Noch kein Konto? Du brauchst eine<br>
        <strong>Einladung</strong> von einem anderen Spieler.
      </p>
    </div>

  </div>

  <!-- Supabase direkt laden — kein ES-Modul nötig -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // Prüfen ob Supabase geladen ist
    if (typeof supabase === 'undefined') {
      document.getElementById('error-msg').textContent = 'Verbindungsfehler. Bitte Seite neu laden.';
      document.getElementById('error-msg').style.display = 'block';
    }
    // Supabase initialisieren
    const SUPABASE_URL  = 'https://ovomstveukjivfhepyyj.supabase.co';   // ← aus Supabase Dashboard → Settings → API
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92b21zdHZldWtqaXZmaGVweXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTA5MDAsImV4cCI6MjA5MTMyNjkwMH0.kFvZg2dBoOPUfO6380Y4v15fiPdFgEDNZchfIgCBVeA';        // ← aus Supabase Dashboard → Settings → API
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Bereits eingeloggt?
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        const base = window.location.href.replace(/pages\/login\.html.*$/, '');
        window.location.href = base + 'pages/dashboard.html';
      }
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');

      document.getElementById('error-msg').style.display = 'none';

      if (!email || !password) {
        showError('Bitte E-Mail und Passwort eingeben.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message?.includes('Invalid') ? 'E-Mail oder Passwort falsch.' : error.message);
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }

      if (data.session) {
        const base = window.location.href.replace(/pages\/login\.html.*$/, '');
        window.location.href = base + 'pages/dashboard.html';
      }
    }

    // Enter-Taste
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
