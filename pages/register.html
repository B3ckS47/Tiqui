<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Registrieren</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <meta name="theme-color" content="#e0e5ec">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-lg);
    }

    .register-wrapper {
      width: 100%;
      max-width: 400px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-xl);
      box-shadow: var(--neu-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto var(--space-md);
    }

    .logo-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }

    .logo-title span { color: var(--accent); }

    /* Token-Status-Banner */
    .token-banner {
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .token-banner.checking {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      color: var(--text-muted);
    }

    .token-banner.valid {
      background: var(--accent-bg);
      color: var(--accent-dark);
    }

    .token-banner.invalid {
      background: #fde8e8;
      color: var(--danger);
    }

    .register-card {
      background: var(--bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--neu-raised);
      padding: var(--space-xl);
    }

    .register-card h2 {
      font-size: 1.1rem;
      margin-bottom: var(--space-lg);
      color: var(--text-secondary);
      font-weight: 500;
    }

    .strength-bar {
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      margin-top: var(--space-sm);
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }

    .loader-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-lg);
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .back-link a { color: var(--accent); }

    /* Ungültiger Token → Formular ausblenden */
    .form-blocked {
      opacity: 0.4;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="register-wrapper">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">⚽</div>
      <div class="logo-title">Ti<span>qui</span></div>
    </div>

    <!-- Token-Status -->
    <div class="token-banner checking" id="token-banner">
      <span>⏳</span> Einladung wird geprüft…
    </div>

    <!-- Registrierungsformular -->
    <div class="register-card" id="register-card">
      <h2>Konto erstellen</h2>

      <form id="register-form" novalidate>

        <div class="input-group">
          <label class="input-label" for="username">Benutzername</label>
          <input
            class="input"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="z.B. FußballFan92"
            maxlength="30"
            required
          >
        </div>

        <div class="input-group">
          <label class="input-label" for="email">E-Mail</label>
          <input
            class="input"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="deine@email.de"
            required
          >
        </div>

        <div class="input-group">
          <label class="input-label" for="password">Passwort</label>
          <input
            class="input"
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            placeholder="Mindestens 8 Zeichen"
            minlength="8"
            required
          >
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="password-confirm">Passwort bestätigen</label>
          <input
            class="input"
            type="password"
            id="password-confirm"
            name="password-confirm"
            autocomplete="new-password"
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-md" id="register-btn">
          Konto erstellen
        </button>

      </form>
    </div>

    <p class="back-link">
      Bereits ein Konto? <a href="/pages/login.html">Anmelden</a>
    </p>

  </div>

  <script type="module">
    import { supabase }         from '/js/supabase.js';
    import { redirectIfLoggedIn } from '/js/auth.js';
    import { showToast, setLoading, setFieldError, clearFieldError } from '/js/ui.js';

    // Bereits eingeloggt → weiterleiten
    await redirectIfLoggedIn();

    /* ---- Token aus URL lesen ---- */
    const params      = new URLSearchParams(window.location.search);
    const inviteToken = params.get('token');

    const tokenBanner  = document.getElementById('token-banner');
    const registerCard = document.getElementById('register-card');
    const registerBtn  = document.getElementById('register-btn');

    /* ---- Token validieren ---- */
    async function validateToken() {
      if (!inviteToken) {
        tokenBanner.className = 'token-banner invalid';
        tokenBanner.innerHTML = '<span>✕</span> Kein Einladungslink gefunden. Bitte fordere eine Einladung an.';
        registerCard.classList.add('form-blocked');
        return false;
      }

      const { data, error } = await supabase
        .from('invitations')
        .select('id, used, expires_at')
        .eq('token', inviteToken)
        .single();

      if (error || !data) {
        tokenBanner.className = 'token-banner invalid';
        tokenBanner.innerHTML = '<span>✕</span> Ungültige Einladung.';
        registerCard.classList.add('form-blocked');
        return false;
      }

      if (data.used) {
        tokenBanner.className = 'token-banner invalid';
        tokenBanner.innerHTML = '<span>✕</span> Diese Einladung wurde bereits verwendet.';
        registerCard.classList.add('form-blocked');
        return false;
      }

      if (new Date(data.expires_at) < new Date()) {
        tokenBanner.className = 'token-banner invalid';
        tokenBanner.innerHTML = '<span>✕</span> Diese Einladung ist abgelaufen.';
        registerCard.classList.add('form-blocked');
        return false;
      }

      tokenBanner.className = 'token-banner valid';
      tokenBanner.innerHTML = '<span>✓</span> Gültige Einladung — willkommen bei Tiqui!';
      return true;
    }

    const tokenValid = await validateToken();

    /* ---- Passwort-Stärke-Anzeige ---- */
    const passwordEl = document.getElementById('password');
    const strengthEl = document.getElementById('strength-fill');

    passwordEl.addEventListener('input', () => {
      const val = passwordEl.value;
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const pct    = (score / 5) * 100;
      const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
      strengthEl.style.width      = pct + '%';
      strengthEl.style.background = colors[score - 1] ?? 'transparent';
    });

    /* ---- Formular absenden ---- */
    const form        = document.getElementById('register-form');
    const usernameEl  = document.getElementById('username');
    const emailEl     = document.getElementById('email');
    const passConfEl  = document.getElementById('password-confirm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!tokenValid) return;

      const username = usernameEl.value.trim();
      const email    = emailEl.value.trim();
      const password = passwordEl.value;
      const passConf = passConfEl.value;

      /* Validierung */
      let hasError = false;

      if (!username || username.length < 2) {
        setFieldError(usernameEl, 'Benutzername muss mindestens 2 Zeichen lang sein.');
        hasError = true;
      } else { clearFieldError(usernameEl); }

      if (!email || !email.includes('@')) {
        setFieldError(emailEl, 'Bitte eine gültige E-Mail-Adresse eingeben.');
        hasError = true;
      } else { clearFieldError(emailEl); }

      if (password.length < 8) {
        setFieldError(passwordEl, 'Passwort muss mindestens 8 Zeichen lang sein.');
        hasError = true;
      } else { clearFieldError(passwordEl); }

      if (password !== passConf) {
        setFieldError(passConfEl, 'Passwörter stimmen nicht überein.');
        hasError = true;
      } else { clearFieldError(passConfEl); }

      if (hasError) return;

      setLoading(registerBtn, true);

      try {
        /* 1. Supabase Auth Signup */
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              username,
              invite_token: inviteToken,
            },
          },
        });

        if (authError) throw authError;

        const userId = authData.user?.id;
        if (!userId) throw new Error('Kein User zurückgegeben.');

        /* 2. Profil in public.users anlegen
              (Fallback falls der DB-Trigger nicht aktiv ist) */
        const { error: profileError } = await supabase
          .from('users')
          .upsert({ id: userId, username })
          .eq('id', userId);

        if (profileError && !profileError.message.includes('duplicate')) {
          throw profileError;
        }

        /* 3. Einladung als benutzt markieren */
        await supabase
          .from('invitations')
          .update({ used: true, used_by: userId })
          .eq('token', inviteToken);

        /* 4. Leaderboard-Eintrag sicherstellen */
        await supabase
          .from('leaderboard_cache')
          .upsert({ user_id: userId });

        showToast('Konto erstellt! Du wirst weitergeleitet…', 'success');
        setTimeout(() => {
          window.location.href = '/pages/dashboard.html';
        }, 1500);

      } catch (err) {
        let msg = 'Registrierung fehlgeschlagen.';
        if (err.message?.includes('already registered')) {
          msg = 'Diese E-Mail-Adresse ist bereits registriert.';
        } else if (err.message?.includes('duplicate')) {
          msg = 'Dieser Benutzername ist bereits vergeben.';
        }
        showToast(msg, 'danger');
        setLoading(registerBtn, false, 'Konto erstellen');
      }
    });
  </script>
</body>
</html>
