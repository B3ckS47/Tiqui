<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Tipps</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <meta name="theme-color" content="#e0e5ec">
  <style>
    /* ---- Filter-Tabs ---- */
    .filter-tabs {
      display: flex;
      gap: var(--space-sm);
      overflow-x: auto;
      padding-bottom: var(--space-sm);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-secondary);
      box-shadow: var(--neu-raised-sm);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-tab.active {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      color: var(--accent);
    }

    /* ---- Gruppenüberschrift ---- */
    .group-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin: var(--space-lg) 0 var(--space-sm);
    }

    .group-header-line {
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.07);
    }

    @media (prefers-color-scheme: dark) {
      .group-header-line { background: rgba(255,255,255,0.07); }
    }

    /* ---- Match-Karte (Tipp-Version) ---- */
    .tip-card {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
      transition: all var(--transition);
    }

    .tip-card.tipped {
      box-shadow: var(--neu-raised-sm);
    }

    .tip-card.locked {
      opacity: 0.65;
    }

    /* Teams-Zeile */
    .tip-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }

    .tip-team {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .tip-team.away {
      flex-direction: row-reverse;
      text-align: right;
    }

    .tip-team-flag {
      font-size: 1.6rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .tip-team-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* Score-Eingabe */
    .tip-score-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .score-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    .score-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .score-btn:active {
      box-shadow: var(--neu-inset-sm);
      transform: scale(0.92);
    }

    .score-display {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      box-shadow: var(--neu-inset);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .score-sep {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text-muted);
      padding-top: 32px; /* score-btn höhe */
    }

    /* Tipp-Footer */
    .tip-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      padding-top: var(--space-md);
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      .tip-footer { border-color: rgba(255,255,255,0.06); }
    }

    .tip-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Ergebnis-Anzeige (nach Spielende) */
    .result-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .result-score {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .result-sep {
      font-size: 1.5rem;
      color: var(--text-muted);
      font-weight: 900;
    }

    .tip-result-badge {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .tip-result-exact     { background: var(--accent-bg); color: var(--accent-dark); }
    .tip-result-diff      { background: #e8f4fd; color: #1a6fa0; }
    .tip-result-tendency  { background: #fef3cd; color: var(--gold-dark); }
    .tip-result-wrong     { background: #fde8e8; color: var(--danger); }
    .tip-result-open      { background: var(--bg); box-shadow: var(--neu-inset-sm); color: var(--text-muted); }

    /* Loader-Spinner für Buttons */
    .loader-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Keine Spiele ---- */
    .no-matches {
      text-align: center;
      padding: var(--space-2xl) 0;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="page-header">
    <div>
      <div class="page-header-title">Tipps ⚽</div>
      <div class="page-header-subtitle" id="tips-subtitle">Spielplan wird geladen…</div>
    </div>
  </div>

  <div class="page-content">

    <!-- Filter-Tabs -->
    <div class="filter-tabs mb-lg" id="filter-tabs">
      <button class="filter-tab active" data-filter="open">Offen</button>
      <button class="filter-tab" data-filter="all">Alle</button>
      <button class="filter-tab" data-filter="finished">Abgeschlossen</button>
    </div>

    <!-- Spielliste -->
    <div id="matches-container">
      <!-- Skeleton -->
      <div class="skel" style="height:160px;border-radius:20px;margin-bottom:12px;"></div>
      <div class="skel" style="height:160px;border-radius:20px;margin-bottom:12px;"></div>
      <div class="skel" style="height:160px;border-radius:20px;"></div>
    </div>

  </div>
</div>

<script type="module">
  import { requireAuth } from '/js/auth.js';
  import { supabase }    from '/js/supabase.js';
  import { initNav }     from '/js/router.js';
  import { showToast, formatDateTime, getCountdown } from '/js/ui.js';

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  const session = await requireAuth();
  if (!session) throw new Error('Nicht eingeloggt');
  const userId = session.user.id;

  initNav();

  /* ---- State ---- */
  let allMatches = [];
  let myTips     = {};   // match_id → tip
  let currentFilter = 'open';

  /* ---- Daten laden ---- */
  async function loadData() {
    const [{ data: matches }, { data: tips }] = await Promise.all([
      supabase
        .from('matches')
        .select('*')
        .order('kickoff_at', { ascending: true }),
      supabase
        .from('tips')
        .select('*')
        .eq('user_id', userId),
    ]);

    allMatches = matches ?? [];
    myTips     = Object.fromEntries((tips ?? []).map(t => [t.match_id, t]));

    // Subtitle aktualisieren
    const open = allMatches.filter(m => m.status === 'upcoming' && !myTips[m.id]).length;
    document.getElementById('tips-subtitle').textContent =
      open > 0 ? `${open} Tipp${open !== 1 ? 's' : ''} noch offen` : 'Alle Tipps abgegeben ✓';

    renderMatches();
  }

  /* ---- Matches rendern ---- */
  function renderMatches() {
    const container = document.getElementById('matches-container');

    // Filter anwenden
    let filtered = allMatches;
    if (currentFilter === 'open') {
      filtered = allMatches.filter(m => m.status === 'upcoming' && !myTips[m.id]);
    } else if (currentFilter === 'finished') {
      filtered = allMatches.filter(m => m.status === 'finished');
    }

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="no-matches">
          <div class="empty-state-icon">✓</div>
          <p class="empty-state-title">
            ${currentFilter === 'open' ? 'Alle Tipps abgegeben!' : 'Keine Spiele in dieser Kategorie.'}
          </p>
        </div>
      `;
      return;
    }

    // Nach Gruppe/Stage gruppieren
    const groups = {};
    filtered.forEach(m => {
      const key = m.group_name ?? stageLabel(m.stage);
      if (!groups[key]) groups[key] = [];
      groups[key].push(m);
    });

    container.innerHTML = Object.entries(groups).map(([group, matches]) => `
      <div class="group-header">
        <span class="section-label" style="margin:0">${group}</span>
        <div class="group-header-line"></div>
      </div>
      ${matches.map(m => renderMatchCard(m)).join('')}
    `).join('');

    // Event-Listener für Score-Buttons & Speichern
    attachListeners();
  }

  /* ---- Einzelne Match-Karte ---- */
  function renderMatchCard(match) {
    const tip      = myTips[match.id];
    const isLocked = match.status !== 'upcoming';
    const isTipped = !!tip;

    const kickoffStr  = formatDateTime(match.kickoff_at);
    const countdown   = getCountdown(match.kickoff_at);
    const countdownEl = countdown ? `<span>⏱ in ${countdown}</span>` : '';

    // Ergebnis-Badge (wenn Spiel beendet)
    let resultBadge = '';
    if (match.status === 'finished' && tip) {
      const badges = {
        exact:    ['🎯 Exakt', 'tip-result-exact'],
        diff:     ['✓ Differenz', 'tip-result-diff'],
        tendency: ['~ Tendenz', 'tip-result-tendency'],
        wrong:    ['✕ Daneben', 'tip-result-wrong'],
      };
      const [label, cls] = badges[tip.point_reason] ?? ['– Offen', 'tip-result-open'];
      resultBadge = `<span class="tip-result-badge ${cls}">${label} · ${tip.points_earned ?? 0} Pkt</span>`;
    } else if (match.status === 'finished' && !tip) {
      resultBadge = `<span class="tip-result-badge tip-result-open">Nicht getippt</span>`;
    }

    // Score-Bereich: Eingabe oder Ergebnis
    let scoreArea = '';
    if (match.status === 'finished') {
      scoreArea = `
        <div class="result-display">
          <span class="result-score">${match.home_score ?? '?'}</span>
          <span class="result-sep">:</span>
          <span class="result-score">${match.away_score ?? '?'}</span>
        </div>
        ${tip ? `
          <div style="text-align:center;margin-bottom:var(--space-md);">
            <span class="text-xs text-muted">Dein Tipp: ${tip.home_score_tip} : ${tip.away_score_tip}</span>
          </div>
        ` : ''}
      `;
    } else {
      const homeVal = tip?.home_score_tip ?? 0;
      const awayVal = tip?.away_score_tip ?? 0;
      scoreArea = `
        <div class="tip-score-area">
          <div class="score-control">
            <button class="score-btn" data-match="${match.id}" data-team="home" data-action="up">+</button>
            <div class="score-display" id="score-home-${match.id}">${homeVal}</div>
            <button class="score-btn" data-match="${match.id}" data-team="home" data-action="down">−</button>
          </div>
          <div class="score-sep">:</div>
          <div class="score-control">
            <button class="score-btn" data-match="${match.id}" data-team="away" data-action="up">+</button>
            <div class="score-display" id="score-away-${match.id}">${awayVal}</div>
            <button class="score-btn" data-match="${match.id}" data-team="away" data-action="down">−</button>
          </div>
        </div>
      `;
    }

    return `
      <div class="tip-card ${isTipped ? 'tipped' : ''} ${isLocked ? 'locked' : ''}" id="card-${match.id}">

        <div class="tip-teams">
          <div class="tip-team">
            <span class="tip-team-flag">${getFlagEmoji(match.home_team)}</span>
            <span class="tip-team-name">${match.home_team}</span>
          </div>
          <div class="tip-team away">
            <span class="tip-team-flag">${getFlagEmoji(match.away_team)}</span>
            <span class="tip-team-name">${match.away_team}</span>
          </div>
        </div>

        ${scoreArea}

        <div class="tip-footer">
          <div class="tip-meta">
            <div>${kickoffStr} Uhr ${countdownEl}</div>
            ${resultBadge}
          </div>
          ${!isLocked ? `
            <button
              class="btn btn-primary btn-sm"
              id="save-btn-${match.id}"
              data-match="${match.id}"
              onclick="saveTip('${match.id}')"
            >
              ${isTipped ? 'Ändern' : 'Tippen'}
            </button>
          ` : ''}
        </div>

      </div>
    `;
  }

  /* ---- Score-Buttons: Event-Listener ---- */
  function attachListeners() {
    document.querySelectorAll('.score-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const matchId = btn.dataset.match;
        const team    = btn.dataset.team;
        const action  = btn.dataset.action;
        const display = document.getElementById(`score-${team}-${matchId}`);
        let val = parseInt(display.textContent, 10);

        if (action === 'up')   val = Math.min(val + 1, 20);
        if (action === 'down') val = Math.max(val - 1, 0);

        display.textContent = val;
      });
    });
  }

  /* ---- Tipp speichern ---- */
  window.saveTip = async function(matchId) {
    const btn      = document.getElementById(`save-btn-${matchId}`);
    const homeDisp = document.getElementById(`score-home-${matchId}`);
    const awayDisp = document.getElementById(`score-away-${matchId}`);

    if (!homeDisp || !awayDisp) return;

    const homeScore = parseInt(homeDisp.textContent, 10);
    const awayScore = parseInt(awayDisp.textContent, 10);

    const orig = btn.textContent;
    btn.disabled  = true;
    btn.innerHTML = '<span class="loader-spinner"></span>';

    try {
      const { error } = await supabase
        .from('tips')
        .upsert(
          { user_id: userId, match_id: matchId, home_score_tip: homeScore, away_score_tip: awayScore },
          { onConflict: 'user_id,match_id' }
        );

      if (error) throw error;

      // Lokalen State aktualisieren
      myTips[matchId] = { ...myTips[matchId], home_score_tip: homeScore, away_score_tip: awayScore };

      showToast(`Tipp gespeichert: ${homeScore} : ${awayScore} ✓`, 'success');
      btn.textContent = 'Ändern';

      // Karte als getippt markieren
      document.getElementById(`card-${matchId}`)?.classList.add('tipped');

      // Subtitle aktualisieren
      const open = allMatches.filter(m => m.status === 'upcoming' && !myTips[m.id]).length;
      document.getElementById('tips-subtitle').textContent =
        open > 0 ? `${open} Tipp${open !== 1 ? 's' : ''} noch offen` : 'Alle Tipps abgegeben ✓';

    } catch (err) {
      showToast('Fehler beim Speichern. Bitte erneut versuchen.', 'danger');
      btn.textContent = orig;
    } finally {
      btn.disabled = false;
    }
  };

  /* ---- Filter-Tabs ---- */
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;

    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderMatches();
  });

  /* ---- Hilfsfunktionen ---- */
  function stageLabel(stage) {
    const labels = {
      group:      'Gruppenphase',
      round_of_16:'Achtelfinale',
      quarter:    'Viertelfinale',
      semi:       'Halbfinale',
      third_place:'Spiel um Platz 3',
      final:      'Finale',
    };
    return labels[stage] ?? stage;
  }

  function getFlagEmoji(teamName) {
    // Einfache Flag-Map — du kannst diese nach Bedarf erweitern
    const flags = {
      'Deutschland': '🇩🇪', 'Frankreich': '🇫🇷', 'Spanien': '🇪🇸',
      'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Italien': '🇮🇹', 'Portugal': '🇵🇹',
      'Brasilien': '🇧🇷', 'Argentinien': '🇦🇷', 'Niederlande': '🇳🇱',
      'Belgien': '🇧🇪', 'Kroatien': '🇭🇷', 'Dänemark': '🇩🇰',
      'Schweiz': '🇨🇭', 'Österreich': '🇦🇹', 'Polen': '🇵🇱',
      'USA': '🇺🇸', 'Mexiko': '🇲🇽', 'Kanada': '🇨🇦',
      'Japan': '🇯🇵', 'Südkorea': '🇰🇷', 'Australien': '🇦🇺',
      'Marokko': '🇲🇦', 'Senegal': '🇸🇳', 'Nigeria': '🇳🇬',
      'Saudi-Arabien': '🇸🇦', 'Iran': '🇮🇷', 'Uruguay': '🇺🇾',
      'Kolumbien': '🇨🇴', 'Ecuador': '🇪🇨', 'Chile': '🇨🇱',
      'Türkei': '🇹🇷', 'Tschechien': '🇨🇿', 'Ungarn': '🇭🇺',
      'Wales': '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'Schottland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Serbien': '🇷🇸',
    };
    return flags[teamName] ?? '🏳';
  }

  /* ---- Init ---- */
  await loadData();
</script>
</body>
</html>
