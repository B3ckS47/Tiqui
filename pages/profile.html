<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Profil</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <meta name="theme-color" content="#e0e5ec">
  <style>
    /* ---- Profil-Header ---- */
    .profile-hero {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      text-align: center;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: var(--accent-bg);
      box-shadow: var(--neu-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent-dark);
    }

    .profile-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .profile-email {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: -8px;
    }

    .profile-badges {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ---- Stats-Leiste ---- */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }

    .profile-stat {
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-sm);
      text-align: center;
    }

    .profile-stat-value {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text-primary);
      line-height: 1;
    }

    .profile-stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ---- Einladungs-Bereich ---- */
    .invite-card {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    .invite-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }

    .invite-card-title {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 1rem;
    }

    .invite-card-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Generierter Link */
    .invite-link-box {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }

    .invite-link-text {
      flex: 1;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .invite-link-copy {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }

    .invite-link-copy:active {
      box-shadow: var(--neu-inset-sm);
    }

    /* Einladungs-Liste */
    .invite-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .invite-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-md);
      font-size: 0.8rem;
    }

    .invite-item-token {
      flex: 1;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .invite-item-status {
      flex-shrink: 0;
    }

    /* ---- Einstellungs-Liste ---- */
    .settings-list {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: var(--space-lg);
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      transition: all var(--transition);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      text-decoration: none;
    }

    .settings-item:last-child { border-bottom: none; }

    @media (prefers-color-scheme: dark) {
      .settings-item { border-color: rgba(255,255,255,0.05); }
    }

    .settings-item:active {
      background: rgba(0,0,0,0.03);
    }

    .settings-item-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .settings-item-text { flex: 1; }

    .settings-item-label {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .settings-item-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .settings-item-arrow {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .settings-item-danger .settings-item-label { color: var(--danger); }
    .settings-item-danger .settings-item-icon  { color: var(--danger); }

    /* ---- Loader ---- */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skel {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
    }

    .loader-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="page-header">
    <div>
      <div class="page-header-title">Profil 👤</div>
      <div class="page-header-subtitle">Dein Konto & Einladungen</div>
    </div>
  </div>

  <div class="page-content">

    <!-- Profil-Hero -->
    <div class="profile-hero" id="profile-hero">
      <div class="skel" style="width:80px;height:80px;border-radius:50%;"></div>
      <div class="skel" style="width:140px;height:24px;border-radius:8px;"></div>
      <div class="skel" style="width:180px;height:16px;border-radius:8px;"></div>
    </div>

    <!-- Stats -->
    <div class="section-label">Statistiken</div>
    <div class="profile-stats mb-lg" id="profile-stats">
      <div class="profile-stat skel" style="height:72px;"></div>
      <div class="profile-stat skel" style="height:72px;"></div>
      <div class="profile-stat skel" style="height:72px;"></div>
    </div>

    <!-- Einladungen -->
    <div class="section-label">Freunde einladen</div>
    <div class="invite-card">
      <div class="invite-card-header">
        <div>
          <div class="invite-card-title">Einladungslink</div>
          <div class="invite-card-sub">Gültig für 7 Tage · einmalig verwendbar</div>
        </div>
        <button class="btn btn-primary btn-sm" id="generate-btn" onclick="generateInvite()">
          Erstellen
        </button>
      </div>

      <!-- Generierter Link (anfangs versteckt) -->
      <div id="invite-link-area" class="hidden">
        <div class="invite-link-box">
          <span class="invite-link-text" id="invite-link-text"></span>
          <button class="invite-link-copy" onclick="copyLink()">Kopieren</button>
        </div>
        <button class="btn btn-secondary btn-block btn-sm" id="share-btn" onclick="shareLink()">
          Teilen ↗
        </button>
      </div>

      <!-- Meine Einladungen -->
      <div id="my-invites-area" class="hidden">
        <hr class="divider">
        <div class="section-label">Meine Einladungen</div>
        <div class="invite-list" id="invite-list"></div>
      </div>
    </div>

    <!-- Einstellungen -->
    <div class="section-label">Einstellungen</div>
    <div class="settings-list">

      <div class="settings-item" onclick="editUsername()">
        <div class="settings-item-icon">✏️</div>
        <div class="settings-item-text">
          <div class="settings-item-label">Benutzername ändern</div>
          <div class="settings-item-sub" id="current-username-sub">Wird geladen…</div>
        </div>
        <span class="settings-item-arrow">›</span>
      </div>

      <a href="/pages/leaderboard.html" class="settings-item">
        <div class="settings-item-icon">📊</div>
        <div class="settings-item-text">
          <div class="settings-item-label">Zur Rangliste</div>
          <div class="settings-item-sub">Aktuellen Stand ansehen</div>
        </div>
        <span class="settings-item-arrow">›</span>
      </a>

      <a href="/pages/admin/admin-dashboard.html" class="settings-item hidden" id="admin-link">
        <div class="settings-item-icon">⚙️</div>
        <div class="settings-item-text">
          <div class="settings-item-label">Admin-Bereich</div>
          <div class="settings-item-sub">Spiele, Quiz & User verwalten</div>
        </div>
        <span class="settings-item-arrow">›</span>
      </a>

    </div>

    <!-- Logout -->
    <div class="settings-list">
      <div class="settings-item settings-item-danger" onclick="handleLogout()">
        <div class="settings-item-icon">🚪</div>
        <div class="settings-item-text">
          <div class="settings-item-label">Abmelden</div>
        </div>
        <span class="settings-item-arrow">›</span>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { requireAuth, getCurrentUser, logout } from '/js/auth.js';
  import { supabase }                            from '/js/supabase.js';
  import { initNav, getInitials }                from '/js/router.js';
  import { showToast, showConfirm }              from '/js/ui.js';

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  const session = await requireAuth();
  if (!session) throw new Error('Nicht eingeloggt');
  const userId = session.user.id;
  const email  = session.user.email;

  initNav();

  let currentUser = null;
  let currentInviteLink = '';

  /* ---- Profil laden ---- */
  async function loadProfile() {
    currentUser = await getCurrentUser();
    if (!currentUser) return;

    // Hero
    document.getElementById('profile-hero').innerHTML = `
      <div class="profile-avatar">${getInitials(currentUser.username)}</div>
      <div class="profile-name">${currentUser.username}</div>
      <div class="profile-email">${email}</div>
      <div class="profile-badges">
        ${currentUser.is_admin ? '<span class="badge badge-green">Admin</span>' : ''}
        <span class="badge badge-gray">Mitglied seit ${formatJoinDate(currentUser.created_at)}</span>
      </div>
    `;

    document.getElementById('current-username-sub').textContent =
      `Aktuell: ${currentUser.username}`;

    // Admin-Link einblenden
    if (currentUser.is_admin) {
      document.getElementById('admin-link').classList.remove('hidden');
    }

    // Leaderboard-Stats
    const { data: lb } = await supabase
      .from('leaderboard_cache')
      .select('total_points, rank, tip_points, quiz_points')
      .eq('user_id', userId)
      .single();

    document.getElementById('profile-stats').innerHTML = `
      <div class="profile-stat">
        <div class="profile-stat-value" style="color:var(--accent)">${lb?.total_points ?? 0}</div>
        <div class="profile-stat-label">Punkte</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value">${lb?.rank ? `#${lb.rank}` : '–'}</div>
        <div class="profile-stat-label">Platz</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value">${lb?.tip_points ?? 0}</div>
        <div class="profile-stat-label">Tipp-Pkt.</div>
      </div>
    `;

    // Meine Einladungen laden
    loadMyInvites();
  }

  /* ---- Einladungen laden ---- */
  async function loadMyInvites() {
    const { data: invites } = await supabase
      .from('invitations')
      .select('token, used, expires_at, used_by')
      .eq('invited_by', userId)
      .order('created_at', { ascending: false })
      .limit(10);

    if (!invites || invites.length === 0) return;

    document.getElementById('my-invites-area').classList.remove('hidden');
    document.getElementById('invite-list').innerHTML = invites.map(inv => {
      const expired = new Date(inv.expires_at) < new Date();
      const status  = inv.used
        ? '<span class="badge badge-green">Verwendet</span>'
        : expired
          ? '<span class="badge badge-danger">Abgelaufen</span>'
          : '<span class="badge badge-gray">Offen</span>';

      const shortToken = inv.token.slice(0, 12) + '…';
      return `
        <div class="invite-item">
          <span class="invite-item-token">${shortToken}</span>
          <div class="invite-item-status">${status}</div>
        </div>
      `;
    }).join('');
  }

  /* ---- Einladung generieren ---- */
  window.generateInvite = async function() {
    const btn = document.getElementById('generate-btn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="loader-spinner"></span>';

    try {
      const { data, error } = await supabase
        .from('invitations')
        .insert({ invited_by: userId })
        .select('token')
        .single();

      if (error) throw error;

      const baseUrl = window.location.origin;
      currentInviteLink = `${baseUrl}/pages/register.html?token=${data.token}`;

      document.getElementById('invite-link-text').textContent = currentInviteLink;
      document.getElementById('invite-link-area').classList.remove('hidden');

      showToast('Einladungslink erstellt!', 'success');
      loadMyInvites();

    } catch (err) {
      showToast('Fehler beim Erstellen. Bitte erneut versuchen.', 'danger');
    } finally {
      btn.disabled  = false;
      btn.textContent = 'Neu erstellen';
    }
  };

  /* ---- Link kopieren ---- */
  window.copyLink = async function() {
    if (!currentInviteLink) return;
    try {
      await navigator.clipboard.writeText(currentInviteLink);
      showToast('Link kopiert! ✓', 'success');
    } catch {
      showToast('Bitte Link manuell kopieren.', 'warning');
    }
  };

  /* ---- Link teilen (Web Share API) ---- */
  window.shareLink = async function() {
    if (!currentInviteLink) return;
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Tiqui – WM 2026',
          text:  'Ich lade dich zu Tiqui ein — dem WM 2026 Tipp- & Quiz-Spiel!',
          url:   currentInviteLink,
        });
      } catch {}
    } else {
      // Fallback: kopieren
      await window.copyLink();
    }
  };

  /* ---- Benutzername ändern ---- */
  window.editUsername = async function() {
    const newName = prompt(`Neuer Benutzername (aktuell: ${currentUser?.username}):`);
    if (!newName || newName.trim().length < 2) return;

    const { error } = await supabase
      .from('users')
      .update({ username: newName.trim() })
      .eq('id', userId);

    if (error) {
      showToast('Fehler beim Speichern.', 'danger');
    } else {
      showToast('Benutzername geändert ✓', 'success');
      await loadProfile();
    }
  };

  /* ---- Logout ---- */
  window.handleLogout = async function() {
    const ok = await showConfirm('Möchtest du dich wirklich abmelden?');
    if (ok) await logout();
  };

  /* ---- Hilfsfunktionen ---- */
  function formatJoinDate(iso) {
    return new Date(iso).toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  }

  await loadProfile();
</script>
</body>
</html>
