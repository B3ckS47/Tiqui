<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – Quiz</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <meta name="theme-color" content="#e0e5ec">
  <style>
    /* ---- Session-Auswahl ---- */
    .session-select-card {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      display: block;
    }

    .session-select-card:active {
      box-shadow: var(--neu-inset-sm);
      transform: scale(0.98);
    }

    .session-select-card.completed {
      opacity: 0.65;
    }

    .session-select-title {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    .session-select-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: var(--space-md);
    }

    /* ---- Quiz-Spielfläche ---- */
    #quiz-play-area { display: none; }

    /* Timer-Ring */
    .timer-ring-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-md);
    }

    .timer-ring {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
    }

    .timer-ring-track {
      fill: none;
      stroke: var(--bg);
      stroke-width: 6;
      filter: drop-shadow(2px 2px 4px var(--shadow-dark))
              drop-shadow(-2px -2px 4px var(--shadow-light));
    }

    .timer-ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 188;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    .timer-ring-fill.urgent { stroke: var(--danger); }

    .timer-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* Fortschritt */
    .quiz-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Fragen-Karte */
    .question-card {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    .question-category {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.5;
      margin-bottom: var(--space-lg);
    }

    /* Bild für Bildquiz */
    .question-image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: var(--radius-md);
      box-shadow: var(--neu-inset-sm);
      margin-bottom: var(--space-lg);
    }

    /* Optionen */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .quiz-opt-btn {
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 600;
      color: var(--text-primary);
      border: 2px solid transparent;
      width: 100%;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: var(--space-md);
      -webkit-tap-highlight-color: transparent;
    }

    .quiz-opt-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .quiz-opt-btn:disabled { cursor: default; }

    .opt-letter {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all var(--transition);
    }

    .quiz-opt-btn.selected .opt-letter {
      background: var(--accent);
      box-shadow: none;
      color: white;
    }

    .quiz-opt-btn.correct {
      border-color: var(--success);
      background: var(--accent-bg);
      color: var(--accent-dark);
      box-shadow: var(--neu-inset-sm);
    }

    .quiz-opt-btn.correct .opt-letter {
      background: var(--accent);
      color: white;
      box-shadow: none;
    }

    .quiz-opt-btn.wrong {
      border-color: var(--danger);
      background: #fde8e8;
      color: var(--danger);
      box-shadow: var(--neu-inset-sm);
    }

    .quiz-opt-btn.wrong .opt-letter {
      background: var(--danger);
      color: white;
      box-shadow: none;
    }

    /* Schätzfrage */
    .estimate-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    .est-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--bg);
      box-shadow: var(--neu-raised-sm);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .est-btn:active { box-shadow: var(--neu-inset-sm); transform: scale(0.92); }

    .est-display {
      min-width: 100px;
      height: 72px;
      border-radius: var(--radius-md);
      box-shadow: var(--neu-inset);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* Feedback-Banner (nach Antwort) */
    .feedback-banner {
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .feedback-correct { background: var(--accent-bg); color: var(--accent-dark); }
    .feedback-wrong   { background: #fde8e8;           color: var(--danger); }
    .feedback-timeout { background: #fef3cd;           color: var(--gold-dark); }

    /* ---- Ergebnis-Screen ---- */
    #quiz-result-area { display: none; }

    .result-hero {
      text-align: center;
      padding: var(--space-xl) 0;
    }

    .result-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: var(--space-md);
    }

    .result-score {
      font-size: 3rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .result-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: var(--space-sm);
    }

    .result-breakdown {
      background: var(--bg);
      box-shadow: var(--neu-raised);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin: var(--space-lg) 0;
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.85rem;
    }

    .result-row:last-child { border-bottom: none; }

    @media (prefers-color-scheme: dark) {
      .result-row { border-color: rgba(255,255,255,0.05); }
    }

    /* ---- Loader ---- */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skel {
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <div class="page-header" id="quiz-header">
    <div>
      <div class="page-header-title">Quiz 🧠</div>
      <div class="page-header-subtitle" id="quiz-subtitle">Wissen testen</div>
    </div>
  </div>

  <div class="page-content">

    <!-- Session-Auswahl -->
    <div id="quiz-session-list">
      <div class="skel" style="height:120px;border-radius:20px;margin-bottom:12px;"></div>
      <div class="skel" style="height:120px;border-radius:20px;"></div>
    </div>

    <!-- Quiz-Spielfläche -->
    <div id="quiz-play-area">

      <!-- Fortschritt & Timer -->
      <div class="quiz-progress">
        <span id="q-progress-text">Frage 1 von 10</span>
        <span id="q-points-so-far">0 Punkte</span>
      </div>
      <div class="progress-bar mb-md">
        <div class="progress-fill" id="q-progress-bar" style="width:0%"></div>
      </div>

      <div class="timer-ring-wrap">
        <div class="timer-ring">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle class="timer-ring-track" cx="36" cy="36" r="30"/>
            <circle class="timer-ring-fill" id="timer-fill" cx="36" cy="36" r="30"/>
          </svg>
          <div class="timer-number" id="timer-number">20</div>
        </div>
      </div>

      <!-- Fragen-Karte -->
      <div class="question-card" id="question-card">
        <div class="question-category" id="q-category"></div>
        <img class="question-image hidden" id="q-image" alt="Quiz-Bild">
        <div class="question-text" id="q-text"></div>

        <!-- Optionen (Multiple Choice / True-False / Bildquiz) -->
        <div class="options-list hidden" id="q-options"></div>

        <!-- Schätzfrage -->
        <div class="hidden" id="q-estimate">
          <div class="estimate-control">
            <button class="est-btn" onclick="changeEstimate(-10)">−−</button>
            <button class="est-btn" onclick="changeEstimate(-1)">−</button>
            <div class="est-display" id="est-val">0</div>
            <button class="est-btn" onclick="changeEstimate(1)">+</button>
            <button class="est-btn" onclick="changeEstimate(10)">++</button>
          </div>
          <button class="btn btn-primary btn-block" id="est-submit-btn"
                  onclick="submitEstimate()">Antwort abgeben</button>
        </div>
      </div>

      <!-- Feedback -->
      <div id="q-feedback" class="hidden"></div>

      <!-- Weiter-Button -->
      <button class="btn btn-primary btn-block btn-lg hidden"
              id="next-btn" onclick="nextQuestion()">
        Weiter →
      </button>

    </div>

    <!-- Ergebnis-Screen -->
    <div id="quiz-result-area">
      <div class="result-hero">
        <span class="result-emoji" id="result-emoji">🎉</span>
        <div class="result-score" id="result-score">0</div>
        <div class="result-label">Punkte in diesem Quiz</div>
      </div>

      <div class="result-breakdown" id="result-breakdown"></div>

      <button class="btn btn-primary btn-block mb-md"
              onclick="showSessionList()">
        Zurück zur Übersicht
      </button>
      <a href="/pages/leaderboard.html" class="btn btn-secondary btn-block">
        Rangliste ansehen
      </a>
    </div>

  </div>
</div>

<script type="module">
  import { requireAuth } from '/js/auth.js';
  import { supabase }    from '/js/supabase.js';
  import { initNav }     from '/js/router.js';
  import { showToast }   from '/js/ui.js';

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  const session = await requireAuth();
  if (!session) throw new Error('Nicht eingeloggt');
  const userId = session.user.id;

  initNav();

  /* ---- State ---- */
  let quizSessions  = [];
  let currentSess   = null;
  let questions     = [];
  let myAnswers     = {};     // question_id → answer
  let currentIdx    = 0;
  let pointsSoFar   = 0;
  let timerInterval = null;
  let timeLeft      = 20;
  let answered      = false;
  let estimateVal   = 0;
  let categories    = {};

  /* ---- Daten laden ---- */
  async function loadSessions() {
    const [{ data: sess }, { data: myAns }, { data: cats }] = await Promise.all([
      supabase.from('quiz_sessions')
        .select('*, quiz_questions(count)')
        .eq('status', 'active')
        .order('created_at', { ascending: false }),
      supabase.from('quiz_answers')
        .select('question_id, points_earned')
        .eq('user_id', userId),
      supabase.from('quiz_categories').select('id, name, icon'),
    ]);

    quizSessions = sess ?? [];
    myAnswers    = Object.fromEntries((myAns ?? []).map(a => [a.question_id, a]));
    categories   = Object.fromEntries((cats ?? []).map(c => [c.id, c]));

    renderSessionList();
  }

  /* ---- Session-Liste ---- */
  function renderSessionList() {
    const container = document.getElementById('quiz-session-list');

    if (quizSessions.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-state-icon">🧠</span>
          <p class="empty-state-title">Kein Quiz aktiv</p>
          <p class="text-sm">Der Admin startet bald eine neue Runde.</p>
        </div>
      `;
      return;
    }

    container.innerHTML = quizSessions.map(s => {
      const totalQ     = s.quiz_questions?.[0]?.count ?? 0;
      // Wie viele Fragen dieser Session hat der User schon beantwortet?
      const sessionQIds = questions
        .filter(q => q.session_id === s.id)
        .map(q => q.id);
      const doneCount = sessionQIds.filter(id => myAnswers[id]).length;
      const isComplete = totalQ > 0 && doneCount >= totalQ;

      return `
        <div class="session-select-card ${isComplete ? 'completed' : ''}"
             onclick="startQuiz('${s.id}')">
          <div class="session-select-title">${s.title}</div>
          <div class="session-select-meta">
            ${s.description ?? ''} · ${totalQ} Fragen
          </div>
          <div class="progress-bar" style="height:4px;">
            <div class="progress-fill"
                 style="width:${totalQ > 0 ? Math.round(doneCount/totalQ*100) : 0}%">
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px">
            <span class="text-xs text-muted">${doneCount} von ${totalQ} beantwortet</span>
            ${isComplete
              ? '<span class="badge badge-green">Abgeschlossen ✓</span>'
              : '<span class="badge badge-gray">Fortsetzen →</span>'
            }
          </div>
        </div>
      `;
    }).join('');
  }

  /* ---- Quiz starten ---- */
  window.startQuiz = async function(sessionId) {
    const { data: qs } = await supabase
      .from('quiz_questions')
      .select('*, quiz_categories(name, icon)')
      .eq('session_id', sessionId)
      .order('sort_order', { ascending: true });

    if (!qs?.length) {
      showToast('Diese Session hat noch keine Fragen.', 'warning');
      return;
    }

    currentSess = quizSessions.find(s => s.id === sessionId);
    // Nur unbeantwortete Fragen spielen
    questions   = qs.filter(q => !myAnswers[q.id]);
    currentIdx  = 0;
    pointsSoFar = 0;

    if (questions.length === 0) {
      showToast('Du hast alle Fragen dieser Session bereits beantwortet!', 'info');
      return;
    }

    document.getElementById('quiz-session-list').style.display = 'none';
    document.getElementById('quiz-play-area').style.display    = 'block';
    document.getElementById('quiz-result-area').style.display  = 'none';
    document.getElementById('quiz-subtitle').textContent       = currentSess.title;

    showQuestion();
  };

  /* ---- Frage anzeigen ---- */
  function showQuestion() {
    const q = questions[currentIdx];
    if (!q) { showResult(); return; }

    answered    = false;
    estimateVal = 0;

    // Fortschritt
    const total = questions.length;
    const pct   = Math.round(currentIdx / total * 100);
    document.getElementById('q-progress-text').textContent  =
      `Frage ${currentIdx + 1} von ${total}`;
    document.getElementById('q-points-so-far').textContent  =
      `${pointsSoFar} Punkte`;
    document.getElementById('q-progress-bar').style.width   = pct + '%';

    // Kategorie
    const cat = q.quiz_categories;
    document.getElementById('q-category').textContent =
      cat ? `${cat.icon ?? ''} ${cat.name}` : '';

    // Bild
    const imgEl = document.getElementById('q-image');
    if (q.image_url) {
      imgEl.src = q.image_url;
      imgEl.classList.remove('hidden');
    } else {
      imgEl.classList.add('hidden');
    }

    // Frage
    document.getElementById('q-text').textContent = q.question_text;

    // Feedback & Weiter-Btn verstecken
    document.getElementById('q-feedback').classList.add('hidden');
    document.getElementById('next-btn').classList.add('hidden');

    // Optionen rendern
    const optionsEl  = document.getElementById('q-options');
    const estimateEl = document.getElementById('q-estimate');
    const estValEl   = document.getElementById('est-val');

    if (q.question_type === 'estimate') {
      optionsEl.classList.add('hidden');
      estimateEl.classList.remove('hidden');
      estValEl.textContent = '0';
      estimateVal = 0;
    } else {
      estimateEl.classList.add('hidden');
      optionsEl.classList.remove('hidden');

      const options = Array.isArray(q.options) ? q.options : JSON.parse(q.options ?? '[]');
      const letters = ['A', 'B', 'C', 'D'];

      optionsEl.innerHTML = options.map((opt, i) => `
        <button class="quiz-opt-btn" id="opt-btn-${i}"
                onclick="selectOption(${i})">
          <span class="opt-letter">${letters[i]}</span>
          ${opt}
        </button>
      `).join('');
    }

    // Timer starten
    startTimer(q.time_limit_sec);
  }

  /* ---- Timer ---- */
  function startTimer(seconds) {
    clearInterval(timerInterval);
    timeLeft = seconds;
    const circumference = 188; // 2π×30

    const fillEl   = document.getElementById('timer-fill');
    const numEl    = document.getElementById('timer-number');

    fillEl.style.strokeDashoffset = '0';
    fillEl.classList.remove('urgent');
    numEl.textContent = seconds;

    timerInterval = setInterval(() => {
      timeLeft--;
      numEl.textContent = timeLeft;

      const offset = circumference * (1 - timeLeft / seconds);
      fillEl.style.strokeDashoffset = offset;

      if (timeLeft <= 5) fillEl.classList.add('urgent');

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!answered) onTimeout();
      }
    }, 1000);
  }

  /* ---- Option auswählen ---- */
  window.selectOption = function(idx) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const q            = questions[currentIdx];
    const correctAnswer = typeof q.correct_answer === 'string'
      ? JSON.parse(q.correct_answer)
      : q.correct_answer;
    const correctIdx   = correctAnswer.index;
    const isCorrect    = idx === correctIdx;

    // Buttons einfärben
    document.querySelectorAll('.quiz-opt-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === correctIdx) btn.classList.add('correct');
      if (i === idx && !isCorrect) btn.classList.add('wrong');
    });

    const pts = isCorrect ? q.points_value : 0;
    if (isCorrect) pointsSoFar += pts;

    showFeedback(isCorrect, pts, correctAnswer, q);
    saveAnswer(q.id, { index: idx }, isCorrect, pts);
  };

  /* ---- Schätzfrage abgeben ---- */
  window.submitEstimate = function() {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const q            = questions[currentIdx];
    const correctAnswer = typeof q.correct_answer === 'string'
      ? JSON.parse(q.correct_answer)
      : q.correct_answer;

    const diff      = Math.abs(estimateVal - correctAnswer.value);
    const isCorrect = diff <= (correctAnswer.tolerance ?? 0);
    const pts       = isCorrect ? q.points_value : 0;
    if (isCorrect) pointsSoFar += pts;

    document.getElementById('est-submit-btn').disabled = true;

    showFeedback(isCorrect, pts, correctAnswer, q);
    saveAnswer(q.id, { value: estimateVal }, isCorrect, pts);
  };

  /* ---- Schätzwert ändern ---- */
  window.changeEstimate = function(delta) {
    if (answered) return;
    estimateVal = Math.max(0, estimateVal + delta);
    document.getElementById('est-val').textContent = estimateVal;
  };

  /* ---- Timeout ---- */
  function onTimeout() {
    answered = true;
    const q  = questions[currentIdx];

    document.querySelectorAll('.quiz-opt-btn').forEach(btn => btn.disabled = true);
    document.getElementById('est-submit-btn').disabled = true;

    // Richtige Antwort anzeigen
    const correctAnswer = typeof q.correct_answer === 'string'
      ? JSON.parse(q.correct_answer)
      : q.correct_answer;

    if (correctAnswer.index !== undefined) {
      document.getElementById(`opt-btn-${correctAnswer.index}`)
        ?.classList.add('correct');
    }

    const feedbackEl = document.getElementById('q-feedback');
    feedbackEl.className = 'feedback-banner feedback-timeout';
    feedbackEl.innerHTML = '⏰ Zeit abgelaufen! — 0 Punkte';
    feedbackEl.classList.remove('hidden');

    saveAnswer(q.id, null, false, 0);
    document.getElementById('next-btn').classList.remove('hidden');
  }

  /* ---- Feedback anzeigen ---- */
  function showFeedback(isCorrect, pts, correctAnswer, q) {
    const feedbackEl = document.getElementById('q-feedback');
    feedbackEl.classList.remove('hidden');

    if (isCorrect) {
      feedbackEl.className = 'feedback-banner feedback-correct';
      feedbackEl.innerHTML = `🎯 Richtig! +${pts} Punkte`;
    } else {
      feedbackEl.className = 'feedback-banner feedback-wrong';
      let hint = '';
      if (correctAnswer.index !== undefined) {
        const opts = Array.isArray(q.options) ? q.options : JSON.parse(q.options ?? '[]');
        hint = ` — Richtig: ${opts[correctAnswer.index] ?? ''}`;
      } else if (correctAnswer.value !== undefined) {
        hint = ` — Richtig: ${correctAnswer.value} (±${correctAnswer.tolerance ?? 0})`;
      }
      feedbackEl.innerHTML = `✕ Leider falsch${hint}`;
    }

    document.getElementById('next-btn').classList.remove('hidden');
  }

  /* ---- Antwort in DB speichern ---- */
  async function saveAnswer(questionId, givenAnswer, isCorrect, pointsEarned) {
    await supabase.from('quiz_answers').upsert(
      {
        user_id:          userId,
        question_id:      questionId,
        given_answer:     givenAnswer ? JSON.stringify(givenAnswer) : JSON.stringify({}),
        is_correct:       isCorrect,
        response_time_ms: (questions[currentIdx]?.time_limit_sec - timeLeft) * 1000,
        points_earned:    pointsEarned,
      },
      { onConflict: 'user_id,question_id' }
    );
    myAnswers[questionId] = { points_earned: pointsEarned };
  }

  /* ---- Nächste Frage ---- */
  window.nextQuestion = function() {
    currentIdx++;
    if (currentIdx >= questions.length) {
      showResult();
    } else {
      showQuestion();
    }
  };

  /* ---- Ergebnis-Screen ---- */
  async function showResult() {
    clearInterval(timerInterval);

    document.getElementById('quiz-play-area').style.display   = 'none';
    document.getElementById('quiz-result-area').style.display = 'block';

    const total     = questions.length;
    const correct   = questions.filter(q => myAnswers[q.id]?.points_earned > 0).length;
    const pct       = total > 0 ? Math.round(correct / total * 100) : 0;
    const emoji     = pct >= 80 ? '🏆' : pct >= 50 ? '⚽' : '💪';

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-score').textContent = pointsSoFar;

    document.getElementById('result-breakdown').innerHTML = `
      <div class="result-row">
        <span>Fragen beantwortet</span>
        <strong>${total}</strong>
      </div>
      <div class="result-row">
        <span>Richtige Antworten</span>
        <strong>${correct} von ${total} (${pct}%)</strong>
      </div>
      <div class="result-row">
        <span>Punkte in diesem Quiz</span>
        <strong style="color:var(--accent)">${pointsSoFar}</strong>
      </div>
    `;

    // Leaderboard aktualisieren
    await supabase.rpc('refresh_leaderboard');
  }

  /* ---- Zurück zur Session-Liste ---- */
  window.showSessionList = async function() {
    document.getElementById('quiz-result-area').style.display  = 'none';
    document.getElementById('quiz-play-area').style.display    = 'none';
    document.getElementById('quiz-session-list').style.display = 'block';
    document.getElementById('quiz-subtitle').textContent       = 'Wissen testen';
    await loadSessions();
  };

  await loadSessions();
</script>
</body>
</html>
