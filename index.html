<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiqui – WM 2026</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/base.css">
  <meta name="theme-color" content="#f0f2f5">
  <link rel="icon" type="image/svg+xml" href="./icons/tiqui-logo.svg">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .splash {
      text-align: center;
    }
    .splash-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
      animation: bounce 1s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    .splash-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }
    .splash-title span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="splash">
    <img src="./icons/tiqui-logo.svg" class="splash-icon" style="width:80px;height:80px;object-fit:contain;">
    <div class="splash-title">Ti<span>qui</span></div>
  </div>

  <script type="module">
    import { getSession } from './js/auth.js';

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    const session = await getSession();

    if (session) {
      window.location.replace('./pages/dashboard.html');
    } else {
      window.location.replace('./pages/login.html');
    }
  </script>
</body>
</html>
